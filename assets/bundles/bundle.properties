#block descriptions
block.overflown-large-payload-conveyor.description = Moves gigantic payloads, such as units from factories.
block.overflown-payload-builder.description = Fabricates select structures up to 2x2 tiles in size.
block.overflown-payload-breaker.description = Deconstructs inputted structures and units. Returns 100% of the build cost.
block.overflown-payload-propulsion-tower.description = Long-range payload transport structure. Shoots payloads to other linked payload propulsion towers.

block.overflown-plastanium-crusher.description = Produces more plastanium by consuming high amounts of oil and titanium.
block.overflown-disease-mixer.description = Combines a handful of disease fragments into a disease vector.
block.overflown-disease-extractor.description = Extracts rare amount of disease fragments from slag.
block.overflown-surge-link.description = An extreme-distance power node. Can only connect to other surge links.
block.overflown-plastanium-deflect-wall.description = Protects structures from enemy projectiles, telepathically reflects damage from enemy bullets to their owners.
block.overflown-plastanium-deflect-wall-large.description = Protects structures from enemy projectiles, telepathically reflects damage from enemy bullets to their owners.
block.overflown-aquamarine-wall.description = Protects structures from enemy projectiles.
block.overflown-aquamarine-wall-large.description = Protects structures from enemy projectiles.
block.overflown-density-projector.description = Creates an octagonal force field around itself, protecting buildings and units inside from damage. For each phase, as fractions of remaining health; its shield armor increases.
block.overflown-vampirism.description = Fires sapping laser beams at enemy targets.
block.overflown-devastation.description = Fires three massive incendiary laser blasts that damage and burn enemy targets.

block.overflown-plastanium-deflect-wall.details = Do you ever wonder why Segments attack bullets?
block.overflown-devastation.details = Formerly experimental technology. Once coexisted with its contender: the Foreshadow, until this prototype was rejected overall.

